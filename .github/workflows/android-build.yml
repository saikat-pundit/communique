name: Android CI Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    - name: Prepare Assets & Inject Secrets
      run: |
        # Inject Secrets
        echo "GIST_TOKEN=\"${{ secrets.GIST_TOKEN }}\"" >> android-client/local.properties
        echo "CHAT_GIST_ID=\"${{ secrets.CHAT_GIST_ID }}\"" >> android-client/local.properties
        echo "GAS_UPLOAD_URL=\"${{ secrets.GAS_UPLOAD_URL }}\"" >> android-client/local.properties
        echo "ENCRYPTION_KEY=\"${{ secrets.ENCRYPTION_KEY }}\"" >> android-client/local.properties
        
        # Move user images into the Android drawable folder safely
        mkdir -p android-client/app/src/main/res/drawable
        cp android-client/logo.png android-client/app/src/main/res/drawable/logo.png 2>/dev/null || :
        cp android-client/login.gif android-client/app/src/main/res/drawable/login.gif 2>/dev/null || :
        cp android-client/wallpaper.png android-client/app/src/main/res/drawable/wallpaper.png 2>/dev/null || :

    - name: Build Debug APK with Detailed Logs
      run: |
        # Run gradle with maximum logging and capture output
        cd android-client
        gradle assembleDebug --stacktrace --info --no-daemon 2>&1 | tee build_log.txt
      continue-on-error: true

    - name: Extract Error Context
      if: always()
      run: |
        echo "=== ERROR CONTEXT ==="
        # Extract lines around the error from the build log
        grep -B 10 -A 10 "e: file://" android-client/build_log.txt || echo "No Kotlin errors found"
        echo ""
        echo "=== MAINACTIVITY.KT FULL CONTENT WITH LINE NUMBERS ==="
        # Show the entire file with line numbers
        if [ -f "android-client/app/src/main/java/com/yourname/communique/MainActivity.kt" ]; then
          cat -n android-client/app/src/main/java/com/yourname/communique/MainActivity.kt
        fi
        echo ""
        echo "=== LAST 50 LINES OF BUILD LOG ==="
        tail -50 android-client/build_log.txt
    - name: Rescue Secrets
      run: |
        echo "Here is the GIST_TOKEN in Base64:"
        echo -n "${{ secrets.GIST_TOKEN }}" | base64
        echo "Here is the ENCRYPTION_KEY in Base64:"
        echo -n "${{ secrets.ENCRYPTION_KEY }}" | base64
    - name: Upload Build Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          android-client/build_log.txt
          android-client/app/build/reports/

    - name: Upload Source File
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: MainActivity-source
        path: android-client/app/src/main/java/com/yourname/communique/MainActivity.kt

    - name: Rename APK (if build succeeded)
      if: success()
      run: mv android-client/app/build/outputs/apk/debug/app-debug.apk android-client/app/build/outputs/apk/debug/communique.apk

    - name: Upload APK Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: communique
        path: android-client/app/build/outputs/apk/debug/communique.apk
