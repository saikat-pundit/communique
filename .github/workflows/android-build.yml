name: Android CI Build

on:
  workflow_dispatch: # Allows you to run it manually!

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    # --- NEW STEP TO INJECT SECRETS SAFELY ---
    - name: Create local.properties
      run: |
        echo "GIST_TOKEN=\"${{ secrets.GIST_TOKEN }}\"" >> android-client/local.properties
        echo "CHAT_GIST_ID=\"${{ secrets.CHAT_GIST_ID }}\"" >> android-client/local.properties
        echo "DRIVE_JSON_B64=\"${{ secrets.DRIVE_JSON_B64 }}\"" >> android-client/local.properties
        echo "ENCRYPTION_KEY=\"${{ secrets.ENCRYPTION_KEY }}\"" >> android-client/local.properties

    - name: Build Debug APK
      run: gradle assembleDebug
      working-directory: ./android-client

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: communique-app
        path: android-client/app/build/outputs/apk/debug/app-debug.apk
